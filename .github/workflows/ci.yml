name: CI Pipeline  

on:  # Triggers: Run on pushes/PRs to main or feat branches, or changes to key files
  push:
    branches: [main, 'feat/**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'dags/**'
      - 'Makefile'
      - 'requirements.txt'
      - 'docker-compose.yaml'
      - 'ci.yml'  # Also trigger on changes to this workflow file itself
  pull_request:
    branches: [main, 'feat/**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'dags/**'
      - 'Makefile'
      - 'requirements.txt'
      - 'docker-compose.yaml'

jobs:
  test-and-lint:  # Job name: Combines testing and linting for efficiency
    runs-on: ubuntu-latest  # Free Linux runner

    steps:
      - name: Checkout code  # Always first: Clone your repo
        uses: actions/checkout@v4

      - name: Set up Python  # Install Python (matches your venv)
        uses: actions/setup-python@v5
        with:
          python-version: '3.9' 

      - name: Cache pip dependencies  # Speed up installs by caching
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies  # Use your requirements.txt
        run: pip install -r requirements.txt

      - name: Run linting  # If you have a linter in Makefile (e.g., flake8/black)
        run: make pylint  # Calls your Makefile—add if missing

      # - name: Run tests  # Execute pytest via Makefile
      #   run: make test  # Assumes 'make test' runs pytest

      # - name: Upload test results  # For debugging failures
      #   uses: actions/upload-artifact@v4
      #   if: always()  # Even if tests fail
      #   with:
      #     name: test-results
      #     path: test-results.xml  # If pytest outputs XML

  build-docker:  # Separate job for Docker (runs after tests pass)
    needs: test-and-lint  # Depends on previous job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image  # Test build without pushing
        run: docker compose build  # Or 'make build' if in Makefile